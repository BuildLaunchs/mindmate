<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mind Mate</title>
    <meta name="description" content="Sign in to your MindCare Youth account to continue your mental wellness journey." />
    <link rel="website icon" href="/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <link rel="stylesheet" href="styles/main.css">
    <style>
      .form-card-animation {
        opacity: 0;
        transform: scale(0.98);
        animation: scaleIn 0.5s ease-out forwards;
      }
      @keyframes scaleIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="min-h-screen bg-gradient-soft flex items-center justify-center" style="padding: 1rem;">
      <div class="w-full max-w-md space-y-6">
        <div class="text-center">
          <a href="index.html" class="inline-flex items-center gap-2" style="text-decoration: none;">
            <i data-lucide="brain" class="w-8 h-8 text-primary"></i>
            <span class="text-2xl font-bold text-foreground">Mind Mate</span>
          </a>
        </div>

        <div class="wellness-card form-card-animation">
          <div class="card-header text-center space-y-2">
            <h1 class="text-2xl font-bold">Welcome Back</h1>
            <p class="card-description">
              Sign in to your account to continue your mental wellness journey
            </p>
          </div>
          <div class="card-content space-y-6">
            <form id="loginForm" class="space-y-4">
              <!-- Role selector has been removed for standard users -->

              <div class="form-group">
                <label for="email" class="label">Email</label>
                <input
                  type="email"
                  id="email"
                  class="input"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password" class="label">Password</label>
                <div class="relative">
                  <input
                    type="password"
                    id="password"
                    class="input pr-10"
                    placeholder="Enter your password"
                    required
                  />
                  <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password')">
                    <i data-lucide="eye" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn btn-wellness w-full">
                Sign In
              </button>
            </form>

            <div class="text-center space-y-4">
              <a href="./forgot-password.html" class="text-sm text-primary">
                Forgot your password?
              </a>
              
              <div class="text-sm text-muted-foreground">
                Don't have an account?
                <a href="verify-email.html" class="text-primary">
                  Sign up here
                </a>
              </div>
              
              <div class="text-sm text-muted-foreground mt-4">
                Are you an administrator?
                <a href="admin-login.html" class="text-primary font-medium">
                  Admin Login
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="text-center text-sm text-muted-foreground">
          <a href="index.html" class="text-primary">
            ← Back to home
          </a>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="scripts/main.js"></script>
    <script>
      // Login page functionality - Embedded
      document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        
        if (loginForm) {
          loginForm.addEventListener('submit', handleLogin);
        }
        
        // Auto-redirect if already logged in
        if (typeof getCurrentUser === 'function') {
          const currentUser = getCurrentUser();
          if (currentUser) {
            const redirectUrl = currentUser.role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
            navigateTo(redirectUrl);
          }
        }
      });

      async function handleLogin(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = 'user'; // Hardcoded since role selector is removed
        
        if (!email || !password) {
          if (typeof showToast === 'function') showToast('Please fill in all fields.', 'error');
          return;
        }
        
        if (typeof validateEmail === 'function' && !validateEmail(email)) {
          if (typeof showToast === 'function') showToast('Please enter a valid email address.', 'error');
          return;
        }
        
        const submitButton = e.target.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Signing In...';
        if (typeof lucide !== 'undefined') lucide.createIcons();
        
        try {
          // Changed URL to point to localhost so it pulls your updated Python code
          const response = await fetch('https://mindmate-ps7s.onrender.com/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: email,
              password: password,
              role: role
            })
          });

          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.error || 'Login failed');
          }

          // Save user data to local storage
          if (typeof setCurrentUser === 'function') setCurrentUser(result.user);
          if (typeof showToast === 'function') showToast(`Welcome back! Redirecting...`, 'success');
          
          setTimeout(() => {
            const redirectUrl = result.user.role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
            if (typeof navigateTo === 'function') {
              navigateTo(redirectUrl);
            } else {
              window.location.href = redirectUrl;
            }
          }, 1000);
          
        } catch (error) {
          if (typeof handleError === 'function') {
            handleError(error, error.message || 'Login failed. Please check your credentials.');
          } else {
            console.error('Login Error:', error);
            if (typeof showToast === 'function') showToast(error.message, 'error');
          }
          submitButton.disabled = false;
          submitButton.innerHTML = 'Sign In';
        }
      }
    </script>
  </body>
</html>
